repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  # Markdown linting (mirrors CI behaviour)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--config, .github/.markdownlint.json]

  # Spelling checks (aligned with CI)
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.8.0
    hooks:
      - id: cspell
        files: \.md$
        args: [--config, .github/.cspell.json]

  # Link checks (aligned with CI lychee settings)
  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.24.1
    hooks:
      - id: lychee
        name: Link check (lychee)
        pass_filenames: false
        args: [--no-progress, --verbose, --max-concurrency, "8", ./**/*.md]
