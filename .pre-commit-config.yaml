repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  # Markdown linting (mirrors CI behaviour)
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--config, .github/.markdownlint.json]

  # Custom validation script
  - repo: local
    hooks:
      - id: validate-instructions
        name: Validate instruction files
        entry: python .github/scripts/validate_instructions.py
        language: python
        pass_filenames: false
        stages: [pre-commit]
