name: quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .github/.markdownlint.json
          globs: "**/*.md"

      - name: Spelling check
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: .github/.cspell.json
          files: "**/*.md"

      - name: Instruction contract checks
        run: python3 scripts/validate-instruction-files.py

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --verbose --max-concurrency 8 ./**/*.md"
