name: docs-quality
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: .github/.markdownlint.json
          globs: "**/*.md"

      - name: Spelling check
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: .github/.cspell.json
          files: "**/*.md"

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --verbose --exclude-mail --max-concurrency 8 ./**/*.md"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate instruction files
        run: python .github/scripts/validate_instructions.py
